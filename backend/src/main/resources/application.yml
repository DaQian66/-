server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:1234/attendance_db
    username: postgres
    password: "3119043808"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: YXR0ZW5kYW5jZS1zeXN0ZW0tand0LXNlY3JldC1rZXktZm9yLTIwMjY=
  expiration: 86400000
  header: Authorization
  token-prefix: "Bearer "

app:
  upload:
    path: ./uploads
    avatar-path: ./uploads/avatars
    face-path: ./uploads/faces
  face:
    recognition:
      threshold: 55.0   # 人脸比对通过的最低置信度 (0-100)，分区域比对会降低整体相关度

logging:
  level:
    com.attendance: debug
    org.springframework.security: info